<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anusha Choudhary</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <style>
    :root {
      --bg: #d6c3ad;
      --text: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      padding: 2rem;
    }

    main {
      text-align: center;
    }

    h1 {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(4rem, 8vw, 7rem);
      font-weight: 400;
      letter-spacing: 0.02em;
      margin: 0 0 2rem;
      line-height: 1;
    }

    .email {
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
      font-family: "Inter", sans-serif;
      font-size: clamp(1.2rem, 2vw, 1.5rem);
      font-weight: 300;
      margin-bottom: 3rem;
    }

    .email a {
      color: inherit;
      text-decoration: none;
    }

    .icons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 3rem;
    }

    .icons a {
      color: var(--text);
      font-size: 2.5rem;
      text-decoration: none;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .icons a:hover {
      transform: translateY(-2px);
      opacity: 0.75;
    }

    @media (max-width: 600px) {
      .icons {
        gap: 2rem;
      }

      .icons a {
        font-size: 2.1rem;
      }
    }
  </style>
</head>
<body>
  <main>

    <h1>Anusha Choudhary</h1>

    <div class="email">
      <i class="fa-regular fa-envelope"></i>
      <a href="mailto:hello@anushachoudhary.com">
        hello@anushachoudhary.com
      </a>
    </div>

    <div class="icons">

      <a
        href="https://www.linkedin.com/in/anushachoudhary/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="LinkedIn"
      >
        <i class="fa-brands fa-linkedin-in"></i>
      </a>

      <a
        href="https://anushachoudhary.pic-time.com/portfolio"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Photography Portfolio"
      >
        <i class="fa-solid fa-camera"></i>
      </a>

      <a
        href="https://www.amazon.com/Seeking-Sunlight-collection-words-photos-ebook/dp/B088K32HR5"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Amazon"
      >
        <i class="fa-brands fa-amazon"></i>
      </a>

      <a
        href="https://www.instagram.com/slouch.potato/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Instagram"
      >
        <i class="fa-brands fa-instagram"></i>
      </a>

    </div>

  </main>
</body>
</html>
