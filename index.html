<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anusha Choudhary</title>
  <style>
    :root {
      --text: #111;
      --muted: #666;
      --bg: #fff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    main {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      margin: 0 0 1rem;
      font-size: 1.5rem;
      font-weight: 500;
    }

    p {
      margin: 0.5rem 0;
    }

    a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid #ddd;
    }

    a:hover {
      border-bottom-color: #111;
    }
  </style>
</head>
<body>
  <main>
    <h1>Anusha Choudhary</h1>
    <p>
      <a href="mailto:hello@anushachoudhary.com">
        hello@anushachoudhary.com
      </a>
    </p>
    <p>
      <a
        href="https://anushachoudhary.pic-time.com/portfolio"
        target="_blank"
        rel="noopener noreferrer"
      >
        Portfolio
      </a>
    </p>
  </main>
</body>
</html>
