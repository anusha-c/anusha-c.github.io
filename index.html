<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anusha Choudhary</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500&family=Syne:wght@500;600;700&display=swap" rel="stylesheet">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <style>
    :root {
      --coffee: #1c120e;
      --coffee-glow: #3d2418;
      --mustard: #d4a017;
      --hot-pink: #ff2d7a;
      --text: #f6efe6;
      --muted: #c4b5a5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      padding: 2rem;
      font-family: "Manrope", sans-serif;
      background-color: var(--coffee);
      background-image:
        radial-gradient(ellipse 90% 60% at 10% 15%, rgba(255, 45, 122, 0.28), transparent 55%),
        radial-gradient(ellipse 80% 55% at 90% 5%, rgba(212, 160, 23, 0.32), transparent 50%),
        radial-gradient(ellipse 70% 50% at 60% 90%, rgba(90, 45, 28, 0.65), transparent 55%),
        linear-gradient(155deg, #2a1810 0%, #1c120e 45%, #26140f 100%);
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.45;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }

    main {
      position: relative;
      z-index: 1;
      text-align: center;
      animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    h1 {
      font-family: "Syne", sans-serif;
      font-size: clamp(3.2rem, 8vw, 5.75rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      margin: 0 0 1.5rem;
      line-height: 1;
      background: linear-gradient(120deg, var(--text) 40%, var(--mustard) 75%, var(--hot-pink) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .email {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      font-size: clamp(1rem, 2vw, 1.15rem);
      font-weight: 300;
      color: var(--muted);
      margin-bottom: 3rem;
    }

    .email a {
      color: inherit;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .email a:hover {
      color: var(--mustard);
    }

    .icons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 2.25rem;
    }

    .icons a {
      color: var(--mustard);
      font-size: 1.65rem;
      text-decoration: none;
      transition: transform 0.2s ease, color 0.2s ease;
    }

    .icons a:hover {
      transform: translateY(-3px);
      color: var(--hot-pink);
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      .icons {
        gap: 1.75rem;
      }

      .icons a {
        font-size: 1.45rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Anusha Choudhary</h1>

    <div class="email">
      <i class="fa-regular fa-envelope"></i>
      <a href="mailto:hello@anushachoudhary.com">hello@anushachoudhary.com</a>
    </div>

    <div class="icons">
      <a
        href="https://www.linkedin.com/in/anushachoudhary/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="LinkedIn"
      >
        <i class="fa-brands fa-linkedin-in"></i>
      </a>

      <a
        href="https://anushachoudhary.pic-time.com/portfolio"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Photography Portfolio"
      >
        <i class="fa-solid fa-camera"></i>
      </a>

      <a href="/realestate/" aria-label="Real Estate Portfolio">
        <i class="fa-solid fa-house"></i>
      </a>

      <a
        href="https://www.amazon.com/Seeking-Sunlight-collection-words-photos-ebook/dp/B088K32HR5"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Amazon"
      >
        <i class="fa-brands fa-amazon"></i>
      </a>

      <a
        href="https://www.instagram.com/slouch.potato/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Instagram"
      >
        <i class="fa-brands fa-instagram"></i>
      </a>
    </div>
  </main>
</body>
</html>
