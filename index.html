<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anusha Choudhary</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500&family=Syne:wght@500;600;700&display=swap" rel="stylesheet">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <style>
    :root {
      --bg: #101214;
      --bg-glow: #1a2228;
      --text: #f2f1ef;
      --muted: #9a9ea3;
      --accent: #b8c4ce;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      padding: 2rem;
      font-family: "Manrope", sans-serif;
      background:
        radial-gradient(ellipse 70% 55% at 50% 0%, var(--bg-glow), transparent 65%),
        var(--bg);
    }

    main {
      text-align: center;
      animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    h1 {
      font-family: "Syne", sans-serif;
      font-size: clamp(3.2rem, 8vw, 5.75rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      margin: 0 0 1.5rem;
      line-height: 1;
    }

    .email {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      font-size: clamp(1rem, 2vw, 1.15rem);
      font-weight: 300;
      color: var(--muted);
      margin-bottom: 3rem;
    }

    .email a {
      color: inherit;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .email a:hover {
      color: var(--text);
    }

    .icons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 2.25rem;
    }

    .icons a {
      color: var(--accent);
      font-size: 1.65rem;
      text-decoration: none;
      transition: transform 0.2s ease, color 0.2s ease;
    }

    .icons a:hover {
      transform: translateY(-3px);
      color: var(--text);
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      .icons {
        gap: 1.75rem;
      }

      .icons a {
        font-size: 1.45rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Anusha Choudhary</h1>

    <div class="email">
      <i class="fa-regular fa-envelope"></i>
      <a href="mailto:hello@anushachoudhary.com">hello@anushachoudhary.com</a>
    </div>

    <div class="icons">
      <a
        href="https://www.linkedin.com/in/anushachoudhary/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="LinkedIn"
      >
        <i class="fa-brands fa-linkedin-in"></i>
      </a>

      <a
        href="https://anushachoudhary.pic-time.com/portfolio"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Photography Portfolio"
      >
        <i class="fa-solid fa-camera"></i>
      </a>

      <a href="/realestate/" aria-label="Real Estate Portfolio">
        <i class="fa-solid fa-house"></i>
      </a>

      <a
        href="https://www.amazon.com/Seeking-Sunlight-collection-words-photos-ebook/dp/B088K32HR5"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Amazon"
      >
        <i class="fa-brands fa-amazon"></i>
      </a>

      <a
        href="https://www.instagram.com/slouch.potato/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Instagram"
      >
        <i class="fa-brands fa-instagram"></i>
      </a>
    </div>
  </main>
</body>
</html>
