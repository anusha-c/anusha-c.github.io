.gallery{
    display:grid;

    height:100%;

    border-radius:8px;
    transition:transform .2s;
}

.gallery img:hover{
    transform:scale(1.04);
}

/* Footer spacing */
footer{
    margin-top:60px;
    text-align:center;
    padding:20px 0;
    color:#666;
    font-size:.9rem;
}
