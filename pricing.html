<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pricing Plans | Anusha Choudhary</title>

<style>

body{
    margin:40px;
    font-family:Arial, sans-serif;
}

/* header navigation */

.nav{
    margin-bottom:30px;
}

.nav a{
    margin-right:20px;
    text-decoration:none;
    font-weight:bold;
    color:black;
}

/* Pricing section */

.pricing-container{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
    gap:20px;
    margin-top:30px;
}

/* Card */

.pricing-card{
    padding:25px;
    border-radius:10px;
    background:white;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
    text-align:center;
    transition:transform .2s ease, box-shadow .2s ease;
}

.pricing-card:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

/* Text */

.pricing-card h3{
    margin-bottom:10px;
}

.time{
    color:#666;
    margin-bottom:15px;
}

.price{
    font-size:22px;
    font-weight:bold;
    color:#ffbf00;
}

</style>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="portfolio.html">Portfolio</a>
<a href="pricing.html">Pricing Plans</a>

</div>

<h2>Pricing Plans</h2>

<div class="pricing-container">

<div class="pricing-card">
<h3>Grad Photoshoot (Solo)</h3>
<p class="time">2 hours</p>
<p class="price">$80</p>
</div>

<div class="pricing-card">
<h3>Grad Photoshoot (Group)</h3>
<p class="time">2 hours</p>
<p class="price">$120</p>
</div>

<div class="pricing-card">
<h3>Single Day Event</h3>
<p class="time">Birthday • Baby Shower • Parties</p>
<p class="price">Contact for Pricing</p>
</div>

<div class="pricing-card">
<h3>Headshots</h3>
<p class="time">1 hour</p>
<p class="price">$50</p>
</div>

</div>

</body>
</html>
