<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real Estate | Anusha Choudhary</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <style>
    :root {
      --bg: #d6c3ad;
      --text: #ffffff;
      --placeholder: rgba(255, 255, 255, 0.22);
      --placeholder-hover: rgba(255, 255, 255, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", sans-serif;
      font-weight: 300;
    }

    .top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1.5rem;
      padding: 2rem clamp(1.5rem, 4vw, 3.5rem) 1.5rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .top a.back {
      color: var(--text);
      text-decoration: none;
      font-size: 0.95rem;
      opacity: 0.85;
      transition: opacity 0.2s ease;
    }

    .top a.back:hover {
      opacity: 1;
    }

    h1 {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(2.4rem, 5vw, 3.75rem);
      font-weight: 400;
      letter-spacing: 0.02em;
      margin: 0;
      line-height: 1.1;
      text-align: center;
      flex: 1;
    }

    .spacer {
      width: 4.5rem;
    }

    .intro {
      text-align: center;
      max-width: 36rem;
      margin: 0 auto 2.5rem;
      padding: 0 1.5rem;
      font-size: clamp(1rem, 1.5vw, 1.15rem);
      line-height: 1.6;
      opacity: 0.9;
    }

    .portfolio {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 260px), 1fr));
      gap: 1rem;
      padding: 0 clamp(1.5rem, 4vw, 3.5rem) 4rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .portfolio-item {
      aspect-ratio: 4 / 5;
      background: var(--placeholder);
      border: none;
      padding: 0;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.5s ease forwards;
      transition: background 0.25s ease, transform 0.25s ease;
    }

    .portfolio-item:hover {
      background: var(--placeholder-hover);
      transform: translateY(-2px);
    }

    .portfolio-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .portfolio-item.is-empty img {
      display: none;
    }

    .portfolio-item.is-empty::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, transparent 48%, rgba(255, 255, 255, 0.18) 49.5%, rgba(255, 255, 255, 0.18) 50.5%, transparent 52%),
        linear-gradient(225deg, transparent 48%, rgba(255, 255, 255, 0.18) 49.5%, rgba(255, 255, 255, 0.18) 50.5%, transparent 52%);
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(90, 72, 55, 0.92);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 2rem;
    }

    .lightbox.is-open {
      display: flex;
    }

    .lightbox-inner {
      max-width: min(90vw, 900px);
      max-height: 85vh;
      width: 100%;
      aspect-ratio: 4 / 5;
      background: var(--placeholder);
      position: relative;
    }

    .lightbox-inner img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }

    .lightbox-inner.has-image img {
      display: block;
    }

    .lightbox-inner.is-empty::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, transparent 48%, rgba(255, 255, 255, 0.18) 49.5%, rgba(255, 255, 255, 0.18) 50.5%, transparent 52%),
        linear-gradient(225deg, transparent 48%, rgba(255, 255, 255, 0.18) 49.5%, rgba(255, 255, 255, 0.18) 50.5%, transparent 52%);
    }

    .lightbox-close,
    .lightbox-nav {
      position: absolute;
      background: transparent;
      border: none;
      color: var(--text);
      cursor: pointer;
      font-size: 1.5rem;
      opacity: 0.85;
      transition: opacity 0.2s ease;
    }

    .lightbox-close:hover,
    .lightbox-nav:hover {
      opacity: 1;
    }

    .lightbox-close {
      top: 1.25rem;
      right: 1.5rem;
      font-size: 1.75rem;
    }

    .lightbox-nav.prev {
      left: 1rem;
    }

    .lightbox-nav.next {
      right: 1rem;
    }

    .lightbox-nav {
      top: 50%;
      transform: translateY(-50%);
      font-size: 2rem;
      padding: 1rem;
    }

    .lightbox-counter {
      position: absolute;
      bottom: 1.25rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      opacity: 0.85;
    }

    @media (max-width: 600px) {
      .top {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .spacer {
        display: none;
      }

      .lightbox-nav {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <header class="top">
    <a class="back" href="/"><i class="fa-solid fa-arrow-left"></i> Home</a>
    <h1>Real Estate</h1>
    <div class="spacer" aria-hidden="true"></div>
  </header>

  <p class="intro">A selection of real estate photography.</p>

  <div class="portfolio" id="portfolio" role="list" aria-label="Real estate portfolio"></div>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer" hidden>
    <button type="button" class="lightbox-close" id="lightbox-close" aria-label="Close">
      <i class="fa-solid fa-xmark"></i>
    </button>
    <button type="button" class="lightbox-nav prev" id="lightbox-prev" aria-label="Previous image">
      <i class="fa-solid fa-chevron-left"></i>
    </button>
    <div class="lightbox-inner is-empty" id="lightbox-inner">
      <img id="lightbox-img" alt="" />
    </div>
    <button type="button" class="lightbox-nav next" id="lightbox-next" aria-label="Next image">
      <i class="fa-solid fa-chevron-right"></i>
    </button>
    <div class="lightbox-counter" id="lightbox-counter"></div>
  </div>

  <script>
    (function () {
      const PHOTOS_DIR = "photos/";
      const portfolio = document.getElementById("portfolio");
      const lightbox = document.getElementById("lightbox");
      const lightboxInner = document.getElementById("lightbox-inner");
      const lightboxImg = document.getElementById("lightbox-img");
      const lightboxCounter = document.getElementById("lightbox-counter");
      const closeBtn = document.getElementById("lightbox-close");
      const prevBtn = document.getElementById("lightbox-prev");
      const nextBtn = document.getElementById("lightbox-next");

      // Loaded from photos/manifest.json — add/remove filenames there as you drop files into photos/
      let images = [];
      let currentIndex = 0;

      function renderPortfolio() {
        portfolio.replaceChildren();
        const frag = document.createDocumentFragment();

        images.forEach((image, index) => {
          const item = document.createElement("button");
          item.type = "button";
          item.className = "portfolio-item is-empty";
          item.setAttribute("role", "listitem");
          item.setAttribute("aria-label", "Portfolio image " + (index + 1));
          item.style.animationDelay = (index * 0.03) + "s";

          const img = document.createElement("img");
          img.alt = "Real estate photo " + (index + 1);
          img.loading = "lazy";
          img.src = image.src;
          img.addEventListener("load", () => {
            image.ready = true;
            item.classList.remove("is-empty");
          });
          img.addEventListener("error", () => {
            image.ready = false;
            img.removeAttribute("src");
            item.classList.add("is-empty");
          });
          item.appendChild(img);

          item.addEventListener("click", () => openLightbox(index));
          frag.appendChild(item);
        });

        portfolio.appendChild(frag);
      }

      function openLightbox(index) {
        currentIndex = index;
        updateLightbox();
        lightbox.hidden = false;
        lightbox.classList.add("is-open");
        document.body.style.overflow = "hidden";
        closeBtn.focus();
      }

      function closeLightbox() {
        lightbox.classList.remove("is-open");
        lightbox.hidden = true;
        document.body.style.overflow = "";
      }

      function updateLightbox() {
        const image = images[currentIndex];
        lightboxCounter.textContent = (currentIndex + 1) + " / " + images.length;

        if (image && image.ready) {
          lightboxImg.src = image.src;
          lightboxImg.alt = "Real estate photo " + (currentIndex + 1);
          lightboxInner.classList.add("has-image");
          lightboxInner.classList.remove("is-empty");
        } else {
          lightboxImg.removeAttribute("src");
          lightboxImg.alt = "";
          lightboxInner.classList.remove("has-image");
          lightboxInner.classList.add("is-empty");
        }
      }

      function showNext(delta) {
        currentIndex = (currentIndex + delta + images.length) % images.length;
        updateLightbox();
      }

      closeBtn.addEventListener("click", closeLightbox);
      prevBtn.addEventListener("click", () => showNext(-1));
      nextBtn.addEventListener("click", () => showNext(1));

      lightbox.addEventListener("click", (e) => {
        if (e.target === lightbox) closeLightbox();
      });

      document.addEventListener("keydown", (e) => {
        if (!lightbox.classList.contains("is-open")) return;
        if (e.key === "Escape") closeLightbox();
        if (e.key === "ArrowLeft") showNext(-1);
        if (e.key === "ArrowRight") showNext(1);
      });

      fetch(PHOTOS_DIR + "manifest.json")
        .then((res) => {
          if (!res.ok) throw new Error("Failed to load photo manifest");
          return res.json();
        })
        .then((filenames) => {
          images = filenames.map((name) => ({
            src: PHOTOS_DIR + name,
            ready: false,
          }));
          renderPortfolio();
        })
        .catch((err) => {
          console.error(err);
        });
    })();
  </script>
</body>
</html>
